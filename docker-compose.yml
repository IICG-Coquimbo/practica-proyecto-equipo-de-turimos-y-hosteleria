services:
  workspace:
    build: .
    container_name: BigData_workspace
    ports:
      - "8888:8888"
      - "6080:6080"
      - "4040:4040"
    volumes:
      - .:/home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes
    dns:
      - 8.8.8.8
      - 8.8.4.4
    user: root
    restart: always
    networks:
      - bigdata_net

  visualizer:
    image: mongo-express
    container_name: BigData_Visualizer
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://lucascheuque_db_user:27032005@ac-apanrvu-shard-00-00.tjvu2a3.mongodb.net:27017,ac-apanrvu-shard-00-01.tjvu2a3.mongodb.net:27017,ac-apanrvu-shard-00-02.tjvu2a3.mongodb.net:27017/?authSource=admin&replicaSet=atlas-rjf6rx-shard-0&tls=true
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
      - ME_CONFIG_BASICAUTH=false
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: always
    networks:
      - bigdata_net

  filebrowser:
    image: filebrowser/filebrowser
    container_name: BigData_FileBrowser
    ports:
      - "8082:80"
    volumes:
      - .:/srv
    restart: always
    networks:
      - bigdata_net

networks:
  bigdata_net:
    driver: bridge
    name: BigData_Network_UCN